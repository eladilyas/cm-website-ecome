name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Minimum gate before any merge to `main`. The same checks run locally:
#   npm ci && npm run lint && npx tsc --noEmit && npm run i18n:check && npm run build
#
# DB-touching work (`prisma migrate deploy`, seeds) is intentionally
# excluded — those run during deploy, not CI. We DO validate the
# Prisma schema parses + the generated client compiles, which catches
# schema drift without needing a live database.

jobs:
  verify:
    name: Typecheck · Lint · Build · i18n
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install (reproducible)
        run: npm ci

      - name: Generate Prisma client
        # Build needs the generated client; we don't need a DB.
        run: npx prisma generate
        env:
          # Prisma generate requires DATABASE_URL to be set even if it
          # never connects. A placeholder is fine.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
          DIRECT_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: i18n parity
        run: npm run i18n:check

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
          DIRECT_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
          BETTER_AUTH_SECRET: ci-placeholder-secret-not-used
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NODE_ENV: production
          # Build resolves env at module evaluation; .env.local isn't
          # available on the runner. These placeholders satisfy the
          # validated schema without touching any real service.
          R2_ACCOUNT_ID: ci
          R2_ACCESS_KEY_ID: ci
          R2_SECRET_ACCESS_KEY: ci
          R2_BUCKET: ci
          RESEND_API_KEY: ci
          EMAIL_FROM: ci@example.com

      # Schema drift detection would need a shadow Postgres service
      # (`prisma migrate diff` rejects --from-migrations without one).
      # Skipped here to keep CI fast and DB-free. The first deploy step
      # on the VPS runs `prisma migrate deploy` which fails loudly if
      # the committed schema has no matching migration.
